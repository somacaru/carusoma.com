steps:
  # Build the container image (using Artifact Registry)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/$PROJECT_ID/arcanedigitalshield-website/website:$BUILD_ID', '.']
  
  # Push the container image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/$PROJECT_ID/arcanedigitalshield-website/website:$BUILD_ID']
  
  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'arcanedigitalshield-website'
      - '--image'
      - 'us-central1-docker.pkg.dev/$PROJECT_ID/arcanedigitalshield-website/website:$BUILD_ID'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '3000'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'GCS_BUCKET_NAME=arcanedigitalshield-contact-submissions'
      - '--set-secrets'
      - 'ADMIN_PASSWORD=admin-password:latest,ADMIN_SESSION_SECRET=admin-session-secret:latest,SMTP_USER=smtp-user:latest,SMTP_APP_PASSWORD=smtp-app-password:latest,NOTIFICATION_EMAIL=notification-email:latest'

images:
  - 'us-central1-docker.pkg.dev/$PROJECT_ID/arcanedigitalshield-website/website:$BUILD_ID' 